<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Americo Certificate Verification</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #5f79d8, #6a4aa5);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #f3f3f3;
        width: 420px;
        border-radius: 20px;
        padding: 25px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        text-align: center;
    }

    h1 {
        color: #5a6fd8;
        margin-bottom: 5px;
    }

    .subtitle {
        font-size: 14px;
        color: #666;
        margin-bottom: 20px;
    }

    .success {
        background: #cfe8d4;
        color: #2c6b3f;
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-weight: bold;
    }

    .card {
        background: #fff;
        border-radius: 15px;
        padding: 5px;
        text-align: left;
        box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
        text-align: justify;
    }
    .card p{
        size: 10px;
    }

    .row {
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid #eee;
    }

    .row:last-child {
        border-bottom: none;
    }

    .label {
        color: #444;
        font-weight: 500;
    }

    .value {
        color: #222;
        font-weight: bold;
    }

    .info {
        margin-top: 15px;
        background: #d9e8f5;
        padding: 10px;
        border-radius: 10px;
        font-size: 13px;
        color: #2b5c88;
    }
</style>
</head>

<body>

<div class="container">
    <image src="logo_certificate-removebg-preview.png"></image>
    <div class="subtitle">Certificate Verification System</div>

    <div class="success">✔ Certificate Information Retrieved Successfully</div>

    <div class="card">
        <div class="row">
            <div class="label">Certificate Number:</div>
            <div class="value">275410 QMX5</div>
        </div>
        <div class="row">
            <div class="label">Company Name:</div>
            <div class="value">POWERMECH TRADING PTE. LTD.</div>
        </div>
        <div class="row">
            <div class="label">Certificate Standard:</div>
            <div class="value">ISO 9001:2015</div>
        </div>
        <div class="row">
            <div class="label">Issue Date:</div>
            <div class="value">2025-02-11</div>
        </div>
        <div class="row">
            <div class="label">Expiry Date:</div>
            <div class="value">2028-02-10</div>
        </div>
        <div class="row">
            <div class="label">Date Of Certification:</div>
            <div class="value">2022-02-11</div>
        </div>
        <div class="row">
            <div class="label">Scope:</div>
            <div class="value"><p>Trading and Export of Machinery, Equipment's, Engines, Generating sets and Automotive
Spares, Tyres, Rubbers products, Contract Manufacturing of Special Purpose Vehicles</p></div>
        </div>
    </div>
    
    <div class="info">
        @ DQS GmbH, August-Schanz-Straße 21, 60433 Frankfurt am Main, Germany
    </div>
</div>

</body>
</html>
